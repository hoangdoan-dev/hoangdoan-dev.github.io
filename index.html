    <style>
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            font-weight: 600;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 24px;
            color: #555;
            flex-direction: column;
        }

        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #ff7094;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.2s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text::after {
            content: '';
            display: inline-block;
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        #anime-intro {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #ffd6f6, #c8e7ff);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: introFadeOut 1s ease forwards;
            animation-delay: 2.5s;
        }

        .intro-content {
            text-align: center;
            animation: zoomIn 1.5s ease;
        }

        .intro-logo {
            font-size: 3rem;
            font-weight: 900;
            color: #ff5454;
            animation: glowText 2s infinite alternate;
        }

        .intro-sub {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #ff5454;
        }

        /* Animations */
        @keyframes zoomIn {
            from {
                transform: scale(0.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes glowText {
            from {
                text-shadow: 0 0 5px #ff8fab;
            }

            to {
                text-shadow: 0 0 20px #c77dff;
            }
        }

        @keyframes introFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>

</head>
