<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng nhập - DHD</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="auth-container">


    <div class="auth-box">


        <h1>
            Đăng nhập
        </h1>


        <p>
            Chào mừng quay trở lại DHD
        </p>



        <form>


            <input 
            type="email" 
            placeholder="Email">


            <input 
            type="password" 
            placeholder="Mật khẩu">



            <button>
                Đăng nhập
            </button>


        </form>



        <span>

            Chưa có tài khoản?

            <a href="register.html">
                Đăng ký
            </a>

        </span>



    </div>


</div>


</body>

</html>
